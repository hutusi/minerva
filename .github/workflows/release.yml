name: Release

on:
  push:
    tags: ["v*"]

# The job cuts a GitHub Release, so it needs write access to repository contents.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile

      - name: Tag matches package version
        # A tag whose number disagrees with the shipped code is a broken release;
        # fail before publishing rather than tag a mismatch.
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(jq -r .version packages/cli/package.json)"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "tag $GITHUB_REF_NAME (=$tag_version) != packages/cli version $pkg_version" >&2
            exit 1
          fi

      - name: Verify gate
        run: bun run verify

      - name: Dead code and unused dependencies
        run: bun run knip

      - name: Extract the changelog section for this version
        # Print the body between this version's heading and the next `## [` heading.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "no changelog section found for $version" >&2
            exit 1
          fi
          echo "--- release notes ---"
          cat RELEASE_NOTES.md

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag

  artifacts:
    name: attach binaries (${{ matrix.os }})
    # Per-platform builds are mandatory: build-release.ts rejects
    # cross-compiles because the ripgrep sidecar is host-only, and the
    # artifact is the pair dist/{minerva, rg}. The build's own self-check
    # (run the binary; verify its signature on macOS) gates every upload.
    needs: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build:release
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact="minerva-${GITHUB_REF_NAME}-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m).tar.gz"
          tar -czf "$artifact" -C dist minerva rg
          gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
